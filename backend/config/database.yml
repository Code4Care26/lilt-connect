# PostgreSQL. Versions 9.3 and up are supported.
#
#   Ensure the pg gem is defined in your Gemfile
#   gem "pg"
#
# Connection settings are driven by environment variables so the same config
# works in local dev (Docker postgres on localhost), CI, and production.
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>
  username: <%= ENV.fetch("DATABASE_USERNAME") { "hackathron" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "hackathron" } %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME") { "hackathron_development" } %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME_TEST") { "hackathron_test" } %>

production:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME") { "hackathron_production" } %>
  username: <%= ENV.fetch("DATABASE_USERNAME") { "hackathron" } %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
