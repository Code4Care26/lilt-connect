# ClusterIssuer Let's Encrypt per cert-manager. Risolve la sfida HTTP-01 creando
# un endpoint temporaneo servito dall'ingress-nginx (per questo il nome DEVE già
# risolvere all'IP del Load Balancer). ACME_EMAIL_PLACEHOLDER è sostituito da
# 08-https.sh con l'email dell'account ACME.
#
# Due issuer: 'staging' (rate limit alti, certificato NON fidato — per provare) e
# 'prod' (certificato valido, rate limit severi). L'Ingress usa 'prod'.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ACME_EMAIL_PLACEHOLDER
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ACME_EMAIL_PLACEHOLDER
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
