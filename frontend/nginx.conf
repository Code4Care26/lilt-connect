# Static PWA server. Path routing (/api -> Rails, /sse -> gosse) is handled by
# the Kubernetes Ingress, not here: this server only ever sees requests for the
# app shell and its assets.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback: unknown paths return index.html so the Vue router
    # can resolve them client-side. Hashed assets are served directly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The service worker must never be cached by intermediaries, or clients get
    # stuck on a stale shell (vite-plugin-pwa uses autoUpdate).
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
}
